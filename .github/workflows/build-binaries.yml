# GitHub Action to build ceph with build-with-container.py

name: Build Ceph Binaries

on:
  workflow_dispatch:
  # Each push run is trivial. No need to restrict how often it runs. 
  # It will be automatically cancelled if a new push happens before the previous one finishes.
  push:
  pull_request:
    branches:
      - 'aka_version_*'

concurrency:
  group: build-ceph-binaries-${{ github.ref }}
  cancel-in-progress: true

env:
  build_arch: "x86-64-v3"
  percentage_of_cpus_to_use: "50"
  enable_ccache: "false"
  enable_sccache: "true"

jobs:

  build-ceph-binaries:
    strategy:
      matrix:
        os_version: 
          #- ubuntu20.04
          - ubuntu22.04
    runs-on: ceph
    steps:
        - name: Checkout ceph
          uses: actions/checkout@v4
          with:
            path: ceph
            fetch-depth: 0
            lfs: true
            submodules: recursive

        - name: Derive build variables
          id: derive-build-vars
          uses: StorageTeam/build-ceph-action/composite-actions/derive-build-vars@v0.6.0
          with:
            ceph_path: ceph
            os_version: ${{ matrix.os_version }}
            percentage_of_cpus_to_use: ${{ env.percentage_of_cpus_to_use }}

        - name: Create build vars config file
          id: write-build-vars-config
          uses: StorageTeam/build-ceph-action/composite-actions/write-build-vars-config@v0.6.0
          with:
            ceph_path: ceph
            enable_ccache: ${{ env.enable_ccache }}
            enable_sccache: ${{ env.enable_sccache }}
            redis_db_number: ${{ steps.derive-build-vars.outputs.redis_db_number }}
            ccache_namespace: ${{ steps.derive-build-vars.outputs.ccache_namespace }}
            cxx_standard: ${{ steps.derive-build-vars.outputs.cxx_standard }}
            number_of_cpus: ${{ steps.derive-build-vars.outputs.nprocesses }}
            output_path: ceph/src/script/custom/build-vars.config
            build_arch: ${{ env.build_arch }}

        - name: Match the Ceph build compiler to the custom dependencies
          # run-all.sh builds the custom gRPC/abseil dependencies with the
          # compiler from src/script/custom/config.env (GCC 13). The generated
          # build-vars.config does not set CC/CXX, so without this step the main
          # Ceph build falls back to the distro-default GCC and mixes toolchains
          # against those GCC 13-built dependencies. Derive CC/CXX from
          # config.env so both use the same compiler.
          run: |
            (
              # Leading blank line guards against build-vars.config not ending
              # in a newline; blank lines are ignored by the env-file parser.
              echo ""
              set -a
              . ceph/src/script/custom/config.env
              echo "CC=${AKCEPH_C_COMPILER:-gcc}"
              echo "CXX=${AKCEPH_CXX_COMPILER:-g++}"
            ) >> ceph/src/script/custom/build-vars.config

        - name: Run Ceph
          uses: StorageTeam/build-ceph-action/composite-actions/run-build-with-container@v0.6.0
          with:
            ceph_path: ceph
            os_version: ${{ matrix.os_version }}
            build_target: build
            env_file: src/script/custom/build-vars.config
            custom_image_script: run-all.sh
            patch_rocksdb_portable: 'true'
            enable_ccache: ${{ env.enable_ccache }}
            enable_sccache: ${{ env.enable_sccache }}