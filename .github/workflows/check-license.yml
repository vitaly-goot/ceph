---
name: "Check for Incompatible Licenses"
on: [pull_request]

jobs:
  pull_request:
    name: "Check for Incompatible Licenses"
    runs-on: self-hosted
    steps:
    - name: Check Pull Request
      uses: actions/github-pr-contains-action@526dfe784d8604ea1c39b6c26609074de95b1ffd  # releases/v14.1
      with:
        github-token: ${{github.token}}
        diffDoesNotContain: "GNU General Public License"
